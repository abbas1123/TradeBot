name: TradeBot hourly paper run

# FREE 24/7 on GitHub Actions — no server, no credit card.
# Runs one iteration per HOUR on the Binance Spot TESTNET (paper money), reports to
# Telegram, and commits its state back so positions persist between runs.
#
# SETUP (one time):
#   1) Push this repo to GitHub (private is fine).
#   2) Get Binance Spot TESTNET keys (free): https://testnet.binance.vision
#   3) Repo -> Settings -> Secrets and variables -> Actions -> add:
#        BINANCE_API_KEY, BINANCE_API_SECRET, TELEGRAM_TOKEN, TELEGRAM_CHAT_ID
#   4) Actions tab -> enable workflows. Use "Run workflow" to test immediately.
#
# NOTE: daily granularity only (Actions can't run continuously). Perfect for the 1d
# strategy; for real-time/continuous use a small VM instead (see DEPLOY.md).

on:
  schedule:
    - cron: "2 * * * *"    # hourly, ~2 min after each 1h candle closes (evaluate every hour)
  workflow_dispatch: {}    # manual "Run workflow" button for testing

permissions:
  contents: write          # allows committing the updated state back

concurrency:
  group: tradebot
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Build .env from secrets
        run: |
          cat > .env <<EOF
          BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET=${{ secrets.BINANCE_API_SECRET }}
          BINANCE_TESTNET=true
          MODE=paper
          PAIRS=BTC/USDT,ETH/USDT,BNB/USDT,XRP/USDT,SOL/USDT,ADA/USDT,DOGE/USDT,LTC/USDT,TRX/USDT,LINK/USDT
          TIMEFRAME=1h
          STRATEGY=donchian
          RISK_PER_TRADE_PCT=2
          MAX_OPEN_POSITIONS=10
          LIVE_CAPITAL_CAP=1000
          STATE_PATH=runtime_state.json
          TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
      - name: Run one paper iteration (Binance testnet)
        run: python main.py --mode paper --once
      - name: Persist state back to the repo
        run: |
          git config user.name "tradebot"
          git config user.email "tradebot@users.noreply.github.com"
          git add runtime_state.json || true
          git commit -m "state update [skip ci]" || echo "no state change"
          git push || echo "nothing to push"
