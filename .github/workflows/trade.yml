name: TradeBot hourly paper run

# FREE 24/7 on GitHub Actions — no server, no credit card, NO exchange account/keys.
# Runs one KEYLESS iteration per HOUR using public price data (Kraken), reports to
# Telegram, and commits its state back so positions persist between runs.
#
# SETUP (one time):
#   1) Publish this repo to GitHub (private is fine — e.g. via GitHub Desktop).
#   2) Repo -> Settings -> Secrets and variables -> Actions -> New repository secret, add ONLY:
#        TELEGRAM_TOKEN, TELEGRAM_CHAT_ID   (copy the values from your local .env)
#   3) Actions tab -> enable workflows -> open this workflow -> "Run workflow" to test now.
#      After that it runs automatically every hour.
#
# NOTE: paper/keyless sim on public prices — no real or testnet money, nothing to lose.
# Uses Kraken public data because Binance public API blocks cloud (GitHub) IPs.
# If Kraken ever fails, change EXCHANGE below to another ccxt id (e.g. kucoin, okx).

on:
  schedule:
    - cron: "2 * * * *"    # hourly, ~2 min after each 1h candle closes (evaluate every hour)
  workflow_dispatch: {}    # manual "Run workflow" button for testing

permissions:
  contents: write          # allows committing the updated state back

concurrency:
  group: tradebot
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Build .env from secrets (Telegram only — no exchange keys)
        run: |
          cat > .env <<EOF
          EXCHANGE=kraken
          MODE=backtest
          TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF
      - name: Run one keyless iteration (public prices)
        run: >
          python main.py --mode serve --source live --once
          --symbols "BTC/USDT,ETH/USDT,SOL/USDT,XRP/USDT,ADA/USDT,DOGE/USDT,LTC/USDT,LINK/USDT"
          --timeframe 1h --capital 1000 --strategy donchian --state runtime_state.json
      - name: Persist state back to the repo
        run: |
          git config user.name "tradebot"
          git config user.email "tradebot@users.noreply.github.com"
          git add runtime_state.json docs/index.html || true
          git commit -m "state + status update [skip ci]" || echo "no change"
          git push || echo "nothing to push"
      - name: Alert Telegram on failure
        if: failure()   # any earlier step failed (pip, data, corrupt state, push) -> say so
        run: |
          curl -sf -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="🛑 TradeBot hourly run FAILED: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
